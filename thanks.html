<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ευχαριστούμε — AGORA Strategies</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/icon-petrol.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .thanks {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--petrol);
    color: var(--paper);
    padding: 80px var(--pad-x);
    text-align: left;
  }
  .thanks__inner {
    max-width: 640px;
    margin: 0 auto;
  }
  .thanks__label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--f-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--terra-soft);
    margin-bottom: 32px;
  }
  .thanks__label::before {
    content: "";
    width: 24px; height: 1px;
    background: var(--terra-soft);
  }
  .thanks h1 {
    margin: 0 0 24px;
    font-family: var(--f-display);
    font-weight: 600;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--paper);
    font-variation-settings: "opsz" 60;
  }
  .thanks p {
    margin: 0 0 32px;
    font-size: 17px;
    line-height: 1.65;
    color: var(--pale);
    max-width: 520px;
  }
  .thanks__back {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--f-mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sand);
    padding: 14px 0;
    border-bottom: 1px solid rgba(244, 237, 226, 0.3);
    transition: border-color 200ms, color 200ms;
  }
  .thanks__back:hover {
    color: var(--terra-soft);
    border-bottom-color: var(--terra-soft);
  }
  .thanks__back svg {
    transition: transform 200ms;
  }
  .thanks__back:hover svg { transform: translateX(-3px); }
</style>
</head>
<body>
<main class="thanks">
  <div class="thanks__inner">
    <span class="thanks__label">Ελήφθη</span>
    <h1>Σας ευχαριστούμε.</h1>
    <p>Πήραμε το μήνυμά σας. Απαντάμε εντός 24 ωρών σε εργάσιμες ημέρες, στο email που μας δώσατε. Στην πρώτη συνάντηση χαρτογράφησης θα μιλήσουμε για τον δικό σας δήμο, χωρίς χρέωση και χωρίς δέσμευση.</p>
    <a href="/" class="thanks__back">
      <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M14 8H2m0 0l4-4M2 8l4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Πίσω στην αρχική</span>
    </a>
  </div>
</main>
</body>
</html>
